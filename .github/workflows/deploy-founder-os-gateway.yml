name: Deploy Founder OS Gateway

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "services/founder-os-gateway/**"
      - ".github/workflows/deploy-founder-os-gateway.yml"

permissions:
  contents: read

concurrency:
  group: founder-os-gateway-production
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/founder-os-gateway

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/founder-os-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Gateway tests
        run: npm test

      - name: Validate Worker bundle
        run: npm run check

      - name: Deploy Worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
