name: Deploy Founder OS Gateway

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "services/founder-os-gateway/**"
      - ".github/workflows/deploy-founder-os-gateway.yml"

permissions:
  contents: read

concurrency:
  group: founder-os-gateway-production
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/founder-os-gateway

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run Gateway tests
        run: npm test

      - name: Validate Worker bundle
        run: npm run check

      - name: Verify Cloudflare deployment credentials
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN repository secret."; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID repository secret."; exit 1; }
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Ensure Founder OS runtime KV namespace
        id: runtime-kv
        shell: bash
        run: |
          set -euo pipefail
          namespace_title="founder-os-runtime-store"
          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces"
          auth_header="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"

          list_response="$(curl --fail --silent --show-error -H "$auth_header" "$api?per_page=100")"
          namespace_id="$(echo "$list_response" | jq -r --arg title "$namespace_title" '.result[] | select(.title == $title) | .id' | head -n 1)"

          if [ -z "$namespace_id" ] || [ "$namespace_id" = "null" ]; then
            create_response="$(curl --fail --silent --show-error \
              -X POST \
              -H "$auth_header" \
              -H "Content-Type: application/json" \
              --data "{\"title\":\"${namespace_title}\"}" \
              "$api")"
            namespace_id="$(echo "$create_response" | jq -r '.result.id')"
          fi

          test -n "$namespace_id" && test "$namespace_id" != "null"
          echo "namespace_id=$namespace_id" >> "$GITHUB_OUTPUT"
          echo "Founder OS runtime KV namespace is ready."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Generate production Worker configuration
        shell: bash
        run: |
          set -euo pipefail
          jq --arg namespace_id "${{ steps.runtime-kv.outputs.namespace_id }}" \
            '.kv_namespaces = [{"binding":"FOUNDER_OS_RUNTIME_STORE","id":$namespace_id}]' \
            wrangler.jsonc > wrangler.deploy.json
          jq -e '.kv_namespaces[] | select(.binding == "FOUNDER_OS_RUNTIME_STORE" and (.id | length > 0))' wrangler.deploy.json >/dev/null
          echo "Production Worker configuration includes FOUNDER_OS_RUNTIME_STORE."

      - name: Deploy Worker with durable runtime binding
        run: npx wrangler deploy --config wrangler.deploy.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployed Worker version
        run: |
          for attempt in 1 2 3 4 5 6; do
            RESPONSE="$(curl --silent --show-error https://founder-os-gateway.dmoseley1024.workers.dev/version || true)"
            if echo "$RESPONSE" | jq -e '.version == "0.6.1" and .capabilities.canonicalOrchestrationRoute == "enabled"' >/dev/null 2>&1; then
              echo "Cloudflare Worker v0.6.1 and canonical orchestration capability verified."
              exit 0
            fi
            echo "Worker v0.6.1 not ready yet; retrying in 5 seconds."
            sleep 5
          done
          echo "Cloudflare Worker did not report the v0.6.1 contract after deployment."
          echo "$RESPONSE"
          exit 1

      - name: Verify Founder OS health and KV binding
        shell: bash
        run: |
          set -euo pipefail
          HEALTH="$(curl --fail --silent --show-error https://founder-os-gateway.dmoseley1024.workers.dev/health)"
          CONFIG="$(curl --fail --silent --show-error https://founder-os-gateway.dmoseley1024.workers.dev/configuration)"
          echo "$HEALTH" | jq -e '.status == "online" and .version == "0.6.1"' >/dev/null
          echo "$CONFIG" | jq -e '.version == "0.6.1"' >/dev/null
          echo "$CONFIG" | jq -e '.required.runtimeStore == true' >/dev/null
          echo "$CONFIG" | jq -e '.configured == true' >/dev/null
          echo "Founder OS live health and durable KV binding verified."

      - name: Verify canonical orchestration endpoint
        shell: bash
        run: |
          set -euo pipefail
          endpoint="https://founder-os-gateway.dmoseley1024.workers.dev/v1/workspaces/natural-nation/packages/NN-BUILD-001/orchestration"
          body_file="$(mktemp)"
          status="$(curl --silent --show-error --output "$body_file" --write-out '%{http_code}' "$endpoint")"
          content_type="$(curl --silent --show-error --head "$endpoint" | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type" {print tolower($2)}' | tail -n 1)"
          body="$(cat "$body_file")"

          echo "Orchestration status: $status"
          echo "Orchestration content-type: ${content_type:-missing}"
          echo "Orchestration response: $body"

          test "$status" = "200"
          echo "$content_type" | grep -q 'application/json'
          echo "$body" | jq -e '.ok == true' >/dev/null
          echo "$body" | jq -e '.state.workspaceId == "natural-nation"' >/dev/null
          echo "$body" | jq -e '.state.packageId == "NN-BUILD-001"' >/dev/null
          echo "$body" | jq -e '.state.tasks | type == "array"' >/dev/null
          echo "Canonical orchestration route returned valid production JSON."

      - name: Verify NN-KS-002 workflow endpoint
        run: |
          RESPONSE="$(curl --fail --silent --show-error -H 'x-founder-os-workspace: workspace-natural-nation' https://founder-os-gateway.dmoseley1024.workers.dev/api/founder-os/workflows/nn-ks-002)"
          echo "$RESPONSE" | grep -q '"id":"nn-ks-002"'
          echo "$RESPONSE" | grep -q '"workspaceId":"workspace-natural-nation"'
          echo "$RESPONSE" | grep -q '"persisted":true'
          echo "NN-KS-002 live workflow endpoint and persistence verified."
