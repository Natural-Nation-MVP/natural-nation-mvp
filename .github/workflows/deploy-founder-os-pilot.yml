name: Deploy Founder OS Home

on:
  push:
    branches: [main]
    paths:
      - 'docs/index.html'
      - 'docs/founder-os/**'
      - '.github/workflows/deploy-founder-os-pilot.yml'
      - 'scripts/validate-founder-os.mjs'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: founder-os-pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate Founder OS site and runtime contracts
        run: node scripts/validate-founder-os.mjs

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Founder OS site
        run: |
          rm -rf _site
          mkdir _site
          cp docs/index.html _site/index.html
          cp -R docs/founder-os _site/founder-os
          touch _site/.nojekyll

      - name: Upload Founder OS Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Founder OS home
        id: deployment
        uses: actions/deploy-pages@v4
