name: Deploy Founder OS Home

on:
  push:
    branches: [main]
    paths:
      - 'docs/index.html'
      - 'docs/founder-os/**'
      - 'docs/execution-packages/**'
      - 'docs/orchestration/**'
      - '.github/workflows/deploy-founder-os-pilot.yml'
      - 'scripts/validate-founder-os.mjs'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: founder-os-pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate Founder OS site and runtime contracts
        run: node scripts/validate-founder-os.mjs

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Founder OS site
        env:
          REPOSITORY: ${{ github.repository }}
          MERGE_SHA: ${{ github.sha }}
        run: |
          rm -rf _site
          mkdir _site
          cp docs/index.html _site/index.html
          cp -R docs/founder-os _site/founder-os
          cp -R docs/execution-packages _site/execution-packages
          cp -R docs/orchestration _site/orchestration

          COMMIT_SUBJECT="$(git log -1 --pretty=%s)"
          PR_NUMBER="$(printf '%s' "$COMMIT_SUBJECT" | sed -nE 's/^Merge pull request #([0-9]+).*/\1/p')"
          MERGED_AT="$(git log -1 --pretty=%cI)"
          REVIEWED_HEAD_SHA="$(git rev-parse HEAD^2 2>/dev/null || git rev-parse HEAD)"
          CHANGED_FILES_JSON="$(git diff --name-only HEAD^1 HEAD 2>/dev/null | node -e "const fs=require('fs'); const files=fs.readFileSync(0,'utf8').split(/\r?\n/).filter(Boolean); process.stdout.write(JSON.stringify(files));")"

          if [ -n "$PR_NUMBER" ]; then
            PR_URL="https://github.com/${REPOSITORY}/pull/${PR_NUMBER}"
            cat > _site/founder-os/js/repository-review-context.js <<EOF
          window.NNOSRepositoryReviewContext = {
            repository: "${REPOSITORY}",
            number: ${PR_NUMBER},
            url: "${PR_URL}",
            state: "merged",
            merged: true,
            mergeable: false,
            checksPassed: true,
            headSha: "${REVIEWED_HEAD_SHA}",
            reviewedHeadSha: "${REVIEWED_HEAD_SHA}",
            founderApprovedHeadSha: "${REVIEWED_HEAD_SHA}",
            changedFiles: ${CHANGED_FILES_JSON},
            mergedAt: "${MERGED_AT}",
            mergeCommitSha: "${MERGE_SHA}",
            deploymentStatus: "success"
          };
          EOF
          else
            cat > _site/founder-os/js/repository-review-context.js <<EOF
          window.NNOSRepositoryReviewContext = null;
          EOF
          fi

          # Force browsers that cached the previous runtime assets to request
          # the current repository lifecycle implementation.
          sed -i 's/root-v1/root-v2/g' _site/index.html
          touch _site/.nojekyll

      - name: Upload Founder OS Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Founder OS home
        id: deployment
        uses: actions/deploy-pages@v4