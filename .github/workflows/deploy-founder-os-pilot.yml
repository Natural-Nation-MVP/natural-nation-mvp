name: Deploy Founder OS Home

on:
  push:
    branches: [main]
    paths:
      - 'founder-os/app/index.html'
      - 'founder-os/app/styles.css'
      - 'founder-os/app/app.mjs'
      - '.github/workflows/deploy-founder-os-pilot.yml'
      - 'scripts/validate-live-pilot.mjs'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: founder-os-pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/validate-live-pilot.mjs

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5

      - name: Prepare root-only Founder OS site
        run: |
          rm -rf _site
          mkdir _site
          cp founder-os/app/index.html _site/index.html
          cp founder-os/app/styles.css _site/styles.css
          cp founder-os/app/app.mjs _site/app.mjs
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Founder OS home
        id: deployment
        uses: actions/deploy-pages@v4