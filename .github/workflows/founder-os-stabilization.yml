name: Founder OS Stabilization

on:
  pull_request:
    paths:
      - 'docs/founder-os/**'
      - 'services/founder-os-gateway/**'
      - 'scripts/validate-founder-os.mjs'
      - '.github/workflows/founder-os-stabilization.yml'
  push:
    branches:
      - 'main'
      - 'agent/orchestration-main-integration'
    paths:
      - 'docs/founder-os/**'
      - 'services/founder-os-gateway/**'
      - 'scripts/validate-founder-os.mjs'
      - '.github/workflows/founder-os-stabilization.yml'

permissions:
  contents: read

jobs:
  validate-founder-os:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate runtime, UX, workspace isolation, and AI dispatch
        run: node scripts/validate-founder-os.mjs
      - name: Test NN-KS-002 live workflow
        working-directory: services/founder-os-gateway
        run: node --test test/nn-ks-002.test.mjs
      - name: Test complete Gateway suite
        id: gateway-tests
        working-directory: services/founder-os-gateway
        shell: bash
        run: |
          set +e
          npm test > gateway-test.log 2>&1
          status=$?
          cat gateway-test.log
          exit "$status"
      - name: Upload Gateway test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-test-diagnostics
          path: services/founder-os-gateway/gateway-test.log
          if-no-files-found: ignore
