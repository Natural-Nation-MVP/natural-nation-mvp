name: Founder OS Stabilization

on:
  pull_request:
    paths:
      - 'docs/founder-os/**'
      - 'services/founder-os-gateway/**'
      - 'scripts/validate-founder-os.mjs'
      - '.github/workflows/founder-os-stabilization.yml'
  push:
    branches:
      - 'main'
      - 'agent/orchestration-main-integration'
    paths:
      - 'docs/founder-os/**'
      - 'services/founder-os-gateway/**'
      - 'scripts/validate-founder-os.mjs'
      - '.github/workflows/founder-os-stabilization.yml'

permissions:
  contents: read

jobs:
  validate-founder-os:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate runtime, UX, workspace isolation, and AI dispatch
        run: node scripts/validate-founder-os.mjs
      - name: Test direct AI provider routing and failover
        working-directory: services/founder-os-gateway
        shell: bash
        run: |
          set +e
          npm test > /tmp/provider-tests.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Provider routing tests failed. Showing the final 120 log lines:"
            tail -n 120 /tmp/provider-tests.log
            exit "$status"
          fi
          echo "Provider routing tests passed."
